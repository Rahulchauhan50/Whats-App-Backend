name: CI/CD WhatsApp Backend

on:
  push:
    branches:
      - main  # Change to 'master' if that's your primary branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the correct directory
            cd ~/Node_backend/Whats-App-Backend
            
            # Pull latest changes
            git pull origin main

            # Use absolute path for npm (Update the path below if 'which npm' is different)
            /home/dev/.nvm/versions/node/v24.14.0/bin/npm install --production
            
            # Use absolute path for pm2 (Update the path below if 'which pm2' is different)
            /home/dev/.nvm/versions/node/v24.14.0/bin/pm2 restart wapi.rahulcodes.tech --update-env
            
            # Install only production dependencies
            npm install --production
            
            # Restart the specific PM2 process we named earlier
            pm2 restart wapi.rahulcodes.tech --update-env